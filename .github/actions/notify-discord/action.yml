name: Notify Discord
description: Post and live-update a Discord card with per-job statuses for this workflow run.
inputs:
  webhook:
    description: Discord webhook URL.
    required: true
  config:
    description: Path to the sidecar config (job allowlist).
    required: false
    default: .github/notify-discord.yml
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - shell: bash
      run: pip install --quiet pyyaml

    - shell: bash
      env:
        DISCORD_WEBHOOK: ${{ inputs.webhook }}
        NOTIFY_DISCORD_CONFIG: ${{ inputs.config }}
        GITHUB_TOKEN: ${{ github.token }}
      run: python "${{ github.action_path }}/notify.py"
